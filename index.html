<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <link rel="stylesheet" type="text/css" href="css/style.css">

</head>

<body>
    <!-- Create a div with centered style-->
    <div style="text-align: center;">
        <div style="width: 500px; margin: 0 auto; margin-top: 100px; font-size: 25px;">Time until Richard and Melody reunite:</div>
        <div id="countdown" style="width: 500px; margin: 0 auto; margin-top: 20px; font-size: 25px;"></div>
        <script>
            
            countdownElement = document.getElementById("countdown");

            // Target date: Fri, Nov 7, 2025, 12:40 PM Central Time
            countdownTime = new Date("2026-03-12T19:27:00-05:00");
            
            function updateCountdown() {
                // Get current time in UTC
                currentTime = new Date();

                timeDifference = countdownTime - currentTime;
                if (timeDifference < 0) {
                    countdownElement.innerHTML = "Richard and Melody have reunited!";
                } else {
                    days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
                    hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
                    seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);
                    countdownElement.innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
                }
            }

            setInterval(updateCountdown, 1000);
            
        </script>
    </div>
     
</html>
